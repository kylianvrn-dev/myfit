<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MYFIT">
<meta name="theme-color" content="#F5F4F0">
<link rel="apple-touch-icon" id="apple-touch-icon">
<script>
(function(){
  var c=document.createElement('canvas');
  c.width=512;c.height=512;
  var ctx=c.getContext('2d');
  // Background black
  ctx.fillStyle='#0A0A0A';
  ctx.beginPath();
  var r=80;
  ctx.moveTo(r,0);ctx.lineTo(512-r,0);ctx.quadraticCurveTo(512,0,512,r);
  ctx.lineTo(512,512-r);ctx.quadraticCurveTo(512,512,512-r,512);
  ctx.lineTo(r,512);ctx.quadraticCurveTo(0,512,0,512-r);
  ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();ctx.fill();
  // Red accent bar bottom
  ctx.fillStyle='#E8001D';
  ctx.fillRect(0,420,512,92);
  // MY in white
  ctx.fillStyle='#FFFFFF';
  ctx.font='900 210px Barlow Condensed,Arial Black,sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('MY',256,200);
  // FIT in red
  ctx.fillStyle='#E8001D';
  ctx.font='900 190px Barlow Condensed,Arial Black,sans-serif';
  ctx.fillText('FIT',256,390);
  // Set as icon
  var url=c.toDataURL('image/png');
  document.getElementById('apple-touch-icon').href=url;
})();
</script>
<title>MYFIT</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F4F0;--bg2:#EEECEA;--bg3:#E4E2DC;
  --white:#FFFFFF;--black:#0A0A0A;
  --red:#E8001D;--red2:#C0001A;
  --gray:#8A8880;--gray2:#B8B6B0;--gray3:#D4D2CC;
  --text:#0A0A0A;--text2:#5A5856;--text3:#9A9890;
  --border:#DEDAD4;--radius:4px;--radius-sm:3px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto}

.header{padding:52px 0 0;background:var(--black);position:relative;overflow:hidden}
.header-inner{padding:16px 20px 0;position:relative;z-index:2}
.header-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:4px}
.header-logo{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;
  letter-spacing:-1px;line-height:.9;color:var(--white);text-transform:uppercase}
.header-logo span{color:var(--red)}
.header-bg{position:absolute;right:-10px;top:-20px;font-family:'Barlow Condensed',sans-serif;
  font-size:160px;font-weight:900;color:rgba(255,255,255,.04);line-height:1;pointer-events:none}
.header-date{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;
  padding:12px 20px;border-top:1px solid rgba(255,255,255,.08);margin-top:14px}

.tabs{display:flex;background:var(--black);border-bottom:2px solid var(--red)}
.tab{flex:1;padding:12px 2px 10px;border:none;background:transparent;color:rgba(255,255,255,.3);
  font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;cursor:pointer;
  transition:all .2s;letter-spacing:1.5px;text-transform:uppercase;
  display:flex;flex-direction:column;align-items:center;gap:4px;position:relative}
.tab svg{width:15px;height:15px}
.tab::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;
  background:var(--red);transform:scaleX(0);transition:transform .2s}
.tab.active{color:var(--white)}
.tab.active::after{transform:scaleX(1)}

.pages{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 100px;background:var(--bg)}
.pages::-webkit-scrollbar{display:none}
.page{display:none;animation:slideIn .25s ease}
.page.active{display:block}
@keyframes slideIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}

.sec-header{padding:22px 20px 14px;position:relative;overflow:hidden;border-bottom:1px solid var(--border)}
.sec-bg{position:absolute;right:-8px;bottom:-16px;font-family:'Barlow Condensed',sans-serif;
  font-size:80px;font-weight:900;color:rgba(0,0,0,.04);line-height:1;pointer-events:none;text-transform:uppercase}
.sec-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--red);margin-bottom:4px}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;
  letter-spacing:-1px;text-transform:uppercase;line-height:.95}

.btn-add{margin:14px 20px 0;width:calc(100% - 40px);padding:13px 20px;
  border:2px solid var(--black);background:transparent;color:var(--black);
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;border-radius:var(--radius)}
.btn-add:active{background:var(--black);color:var(--white)}

.list-wrap{padding:10px 20px 0}

.card{background:var(--white);border-radius:var(--radius);margin-bottom:8px;
  border:1px solid var(--border);position:relative;overflow:hidden}
.card-strip{height:3px;width:100%}
.card-body{padding:14px 16px}
.card-bg-num{position:absolute;right:10px;top:6px;font-family:'Barlow Condensed',sans-serif;
  font-size:54px;font-weight:900;color:rgba(0,0,0,.04);line-height:1;pointer-events:none}
.card-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:3px}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;
  letter-spacing:-.5px;text-transform:uppercase;line-height:1;margin-bottom:8px}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.tag{padding:4px 9px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;border-radius:2px}
.tag-outline{border:1.5px solid var(--border);color:var(--text2)}
.tag-red{background:var(--red);color:var(--white)}
.tag-black{background:var(--black);color:var(--white)}
.tag-gray{background:var(--bg3);color:var(--text2)}
.card-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.card-exos{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.card-exo-row{display:flex;align-items:center;gap:8px;padding:5px 0;
  border-bottom:1px solid var(--bg3);font-size:12px;color:var(--text2)}
.card-exo-row:last-child{border-bottom:none}
.card-exo-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.card-exo-name{flex:1;font-weight:500}
.card-exo-meta{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  color:var(--gray2);letter-spacing:.5px}
.card-actions{display:flex;gap:6px;padding-top:10px;border-top:1px solid var(--bg3)}
.btn-sm{padding:9px 12px;border-radius:var(--radius-sm);border:none;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;
  letter-spacing:1.5px;text-transform:uppercase;transition:all .15s}
.btn-red{background:var(--red);color:var(--white)}
.btn-black{background:var(--black);color:var(--white)}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text2)}
.btn-danger-sm{background:transparent;border:1.5px solid #FECDD3;color:#E11D48;
  padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;
  letter-spacing:1px;text-transform:uppercase}

.color-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:all .2s;
  border:3px solid transparent;position:relative;flex-shrink:0}
.color-dot.selected{border-color:var(--black);transform:scale(1.15)}
.color-dot.selected::after{content:'✓';position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:900}

.overlay{position:fixed;inset:0;background:rgba(10,10,10,.65);backdrop-filter:blur(4px);
  z-index:100;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex;animation:fadein .2s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{background:var(--white);width:100%;max-width:430px;padding:0 0 44px;
  max-height:94vh;overflow-y:auto;animation:modalup .3s cubic-bezier(.22,1,.36,1)}
.modal::-webkit-scrollbar{display:none}
@keyframes modalup{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{background:var(--black);padding:20px;display:flex;align-items:flex-start;justify-content:space-between}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;
  letter-spacing:-1px;text-transform:uppercase;color:var(--white);line-height:.95}
.modal-x{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);
  background:transparent;color:var(--white);cursor:pointer;display:flex;
  align-items:center;justify-content:center;flex-shrink:0}
.modal-body{padding:18px 20px 0}

.form-group{margin-bottom:13px}
.form-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  color:var(--gray);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;display:block}
.form-input{width:100%;padding:12px 14px;background:var(--bg);border:1.5px solid var(--border);
  border-radius:var(--radius);color:var(--text);font-size:15px;font-family:'Barlow',sans-serif;
  outline:none;transition:border-color .2s;font-weight:500}
.form-input:focus{border-color:var(--black)}
.form-input::placeholder{color:var(--gray2)}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
textarea.form-input{resize:none;height:72px}
.btn-full{width:100%;padding:15px;border:none;background:var(--red);color:var(--white);
  border-radius:var(--radius);font-family:'Barlow Condensed',sans-serif;font-size:15px;
  font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:10px;transition:all .15s}
.btn-full:active{background:var(--red2)}
.btn-cancel{width:100%;padding:13px;border:1.5px solid var(--border);background:transparent;
  color:var(--text2);border-radius:var(--radius);font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;margin-top:8px}

.exo-selector{display:flex;flex-direction:column;gap:5px;max-height:210px;overflow-y:auto;margin-bottom:4px}
.exo-selector::-webkit-scrollbar{display:none}
.exo-check{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--bg);
  border-radius:var(--radius-sm);cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.exo-check.selected{background:var(--bg2);border-color:var(--black)}
.exo-check-box{width:20px;height:20px;border-radius:3px;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.exo-check.selected .exo-check-box{background:var(--red);border-color:var(--red)}
.exo-check-box svg{width:11px;height:11px;color:#fff;display:none}
.exo-check.selected .exo-check-box svg{display:block}
.exo-check-name{font-size:14px;font-weight:600;flex:1}
.exo-check-meta{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--gray)}

/* SESSION */
.session-screen{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;
  flex-direction:column;max-width:430px;margin:0 auto}
.session-screen.open{display:flex;animation:slideIn .25s ease}
.session-top{background:var(--black);padding:52px 20px 16px;
  display:flex;align-items:flex-end;justify-content:space-between;position:relative;overflow:hidden}
.session-top-bg{position:absolute;right:-15px;bottom:-20px;font-family:'Barlow Condensed',sans-serif;
  font-size:110px;font-weight:900;color:rgba(255,255,255,.04);line-height:1;pointer-events:none}
.session-name-wrap{flex:1;min-width:0;margin-right:12px}
.session-name{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;
  text-transform:uppercase;color:var(--white);letter-spacing:-1px;line-height:.95}
.session-sub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1px;
  text-transform:uppercase;margin-top:5px;font-family:'Barlow Condensed',sans-serif;font-weight:600}
.btn-stop{padding:10px 14px;border:1.5px solid rgba(232,0,29,.5);background:rgba(232,0,29,.1);
  color:var(--red);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:var(--radius);flex-shrink:0}
.session-body{flex:1;overflow-y:auto;padding:0 0 20px}
.session-body::-webkit-scrollbar{display:none}

.picker-label{padding:16px 20px 10px;font-family:'Barlow Condensed',sans-serif;font-size:12px;
  font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray);border-bottom:1px solid var(--border)}
.picker-list{padding:8px 20px 0;display:flex;flex-direction:column;gap:6px}
.picker-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--white);
  border-radius:var(--radius);cursor:pointer;border:1.5px solid var(--border);transition:all .15s;
  position:relative;overflow:hidden}
.picker-item:active{border-color:var(--black);transform:scale(.99)}
.picker-item.done{opacity:.4}
.picker-side{position:absolute;left:0;top:0;bottom:0;width:3px}
.picker-idx{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;
  color:var(--gray3);line-height:1;width:28px;text-align:center;flex-shrink:0}
.picker-item.done .picker-idx{color:var(--red)}
.picker-info{flex:1;min-width:0}
.picker-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;
  text-transform:uppercase;letter-spacing:-.3px;line-height:1}
.picker-meta{font-size:11px;color:var(--gray);margin-top:2px}

.active-exo{display:none;flex-direction:column}
.active-exo.open{display:flex}
.exo-topbar{display:flex;align-items:center;gap:12px;padding:14px 20px;
  border-bottom:1px solid var(--border);background:var(--white)}
.btn-back{width:36px;height:36px;border-radius:var(--radius);border:1.5px solid var(--border);
  background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:var(--text);transition:all .15s}
.btn-back:active{background:var(--black);color:var(--white);border-color:var(--black)}
.exo-topbar-info{flex:1;min-width:0}
.exo-name-display{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;
  text-transform:uppercase;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exo-meta-display{font-size:11px;color:var(--gray);margin-top:1px}

.series-progress{display:flex;gap:3px;padding:10px 20px 0;background:var(--white)}
.prog-seg{height:3px;flex:1;background:var(--bg3);border-radius:1px;transition:all .35s}
.prog-seg.done{background:var(--red)}
.prog-seg.active{background:var(--black)}

.series-area{padding:10px 20px 0;display:flex;flex-direction:column;gap:8px}
.series-card{background:var(--white);border-radius:var(--radius);border:1.5px solid var(--border);
  overflow:hidden;transition:border-color .2s}
.series-card.active-series{border-color:var(--black)}
.series-card-head{display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px 8px;border-bottom:1px solid var(--bg3)}
.series-lbl{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase}
.series-card.active-series .series-lbl{color:var(--red)}
.series-done-badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;
  letter-spacing:1px;color:#16A34A}
.series-inputs{padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.input-group label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
  color:var(--gray);text-transform:uppercase;letter-spacing:1.5px;display:block;margin-bottom:5px}
.input-group input{width:100%;padding:10px;background:var(--bg);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-size:24px;font-weight:700;
  font-family:'Barlow Condensed',sans-serif;outline:none;text-align:center;transition:border-color .2s}
.input-group input:focus{border-color:var(--black)}
.input-group input::placeholder{color:var(--gray3);font-size:18px;font-weight:400}

.timer-section{padding:10px 20px 0}
.timer-wrap{background:var(--black);border-radius:var(--radius);padding:20px;
  display:flex;flex-direction:column;align-items:center;gap:12px;position:relative;overflow:hidden}
.timer-bg{position:absolute;right:-5px;bottom:-15px;font-family:'Barlow Condensed',sans-serif;
  font-size:90px;font-weight:900;color:rgba(255,255,255,.04);pointer-events:none;line-height:1}
.timer-eye{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4)}
.timer-ring{width:120px;height:120px;position:relative;display:flex;align-items:center;justify-content:center}
.timer-svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.timer-track{fill:none;stroke:rgba(255,255,255,.08);stroke-width:4}
.timer-fill{fill:none;stroke:var(--red);stroke-width:4;stroke-linecap:butt;
  transition:stroke-dashoffset .95s linear;stroke-dasharray:339.3;
  filter:drop-shadow(0 0 8px rgba(232,0,29,.6))}
.timer-num{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;
  color:var(--white);letter-spacing:-2px;line-height:1}
.timer-sub{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4)}
.timer-btns{display:flex;gap:8px;width:100%}
.btn-skip{flex:1;padding:12px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);
  border:none;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:var(--radius-sm)}
.btn-next{flex:2;padding:12px;background:var(--red);color:var(--white);border:none;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:var(--radius-sm)}

.validate-area{padding:10px 20px 0}
.btn-validate{width:100%;padding:15px;border:none;background:var(--red);color:var(--white);
  border-radius:var(--radius);font-family:'Barlow Condensed',sans-serif;font-size:14px;
  font-weight:800;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn-validate:active{background:var(--red2)}
.btn-change{width:100%;padding:12px;border:1.5px solid var(--border);background:transparent;
  color:var(--text2);border-radius:var(--radius);font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;margin-top:6px}

/* END */
.end-modal{position:fixed;inset:0;background:rgba(10,10,10,.85);backdrop-filter:blur(6px);
  z-index:300;display:none;align-items:flex-end;justify-content:center}
.end-modal.open{display:flex;animation:fadein .25s ease}
.end-card{background:var(--white);width:100%;max-width:430px;
  padding:0 0 44px;animation:modalup .3s cubic-bezier(.22,1,.36,1)}
.end-top{background:var(--black);padding:28px 24px;position:relative;overflow:hidden}
.end-top-bg{position:absolute;right:-20px;bottom:-30px;font-family:'Barlow Condensed',sans-serif;
  font-size:140px;font-weight:900;color:rgba(255,255,255,.04);pointer-events:none;line-height:1}
.end-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:6px}
.end-title{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;
  text-transform:uppercase;letter-spacing:-2px;line-height:.9;color:var(--white)}
.end-stats-row{display:flex}
.end-stat{flex:1;padding:18px 12px;border-right:1px solid var(--border);text-align:center}
.end-stat:last-child{border-right:none}
.end-stat-val{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:900;
  color:var(--black);letter-spacing:-1px;line-height:1}
.end-stat-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-top:2px}
.end-body{padding:16px 24px 0}
.end-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px}

/* HISTORY */
.history-item{background:var(--white);margin-bottom:6px;border:1px solid var(--border);
  border-radius:var(--radius);cursor:pointer;position:relative;overflow:hidden}
.history-bar{position:absolute;top:0;left:0;bottom:0;width:4px}
.history-body{padding:14px 16px 14px 22px}
.history-date{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:3px}
.history-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;
  text-transform:uppercase;letter-spacing:-.3px;line-height:1;margin-bottom:8px}
.history-meta{display:flex;gap:10px;align-items:center}
.hist-chip{display:flex;align-items:center;gap:4px;font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--gray)}
.hist-chip svg{width:12px;height:12px;color:var(--red)}
.hist-detail{display:none;border-top:1px solid var(--bg3);padding:12px 16px 14px 22px;background:var(--bg)}
.hist-detail.open{display:block;animation:slideIn .2s ease}
.hist-exo-block{margin-bottom:10px}
.hist-exo-name{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--red);margin-bottom:6px}
.hist-series-row{display:flex;gap:5px;flex-wrap:wrap}
.hist-serie-chip{padding:4px 10px;background:var(--white);border:1px solid var(--border);
  border-radius:2px;font-size:11px;color:var(--text2)}
.hist-serie-chip b{color:var(--text);font-weight:700}

/* CALENDAR */
.cal-view-switch{display:flex;margin:14px 20px 0;border:1.5px solid var(--black);
  border-radius:var(--radius);overflow:hidden}
.cal-view-btn{flex:1;padding:10px;border:none;background:transparent;
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;color:var(--gray);transition:all .15s}
.cal-view-btn.active{background:var(--black);color:var(--white)}
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 8px}
.cal-month{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;
  text-transform:uppercase;letter-spacing:-1px}
.cal-nav-btns{display:flex;gap:6px}
.cal-nav-btn{width:34px;height:34px;border-radius:var(--radius);border:1.5px solid var(--border);
  background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text);transition:all .15s}
.cal-nav-btn:active{background:var(--black);color:var(--white);border-color:var(--black)}
.cal-legend{display:flex;flex-wrap:wrap;gap:6px;padding:0 20px 12px}
.legend-item{display:flex;align-items:center;gap:5px;font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:1px;flex-shrink:0}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 20px}
.cal-day-lbl{text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:10px;
  font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray2);padding:4px 0 8px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;border-radius:var(--radius-sm);position:relative;
  cursor:default;transition:all .15s;min-height:34px;gap:2px}
.cal-cell.clickable{cursor:pointer}
.cal-cell.clickable:active{transform:scale(.88)}
.cal-cell-num{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;line-height:1}
.cal-cell.today:not(.clickable) .cal-cell-num{background:var(--black);color:var(--white);
  width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.cal-cell-dots{display:flex;gap:2px}
.cal-cell-dot{width:4px;height:4px;border-radius:1px}

.week-wrap{padding:0 20px;display:flex;flex-direction:column;gap:4px}
.week-row{display:flex;gap:10px;min-height:50px;align-items:stretch}
.week-label{width:38px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.week-day{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;
  text-transform:uppercase;letter-spacing:1px;color:var(--gray2)}
.week-num{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:var(--text);line-height:1}
.week-num.today{color:var(--red)}
.week-sessions{flex:1;display:flex;flex-direction:column;gap:3px;justify-content:center}
.week-chip{padding:9px 12px;border-radius:var(--radius-sm);font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  color:var(--white);cursor:pointer;transition:all .15s}
.week-chip:active{transform:scale(.98)}
.week-rest{padding:9px 12px;border-radius:var(--radius-sm);background:var(--bg3);
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--gray2)}

.cal-detail-overlay{position:fixed;inset:0;background:rgba(10,10,10,.65);backdrop-filter:blur(4px);
  z-index:150;display:none;align-items:flex-end;justify-content:center}
.cal-detail-overlay.open{display:flex;animation:fadein .2s ease}
.cal-detail-sheet{background:var(--white);width:100%;max-width:430px;
  max-height:75vh;overflow-y:auto;animation:modalup .3s cubic-bezier(.22,1,.36,1)}
.cal-detail-sheet::-webkit-scrollbar{display:none}
.cal-detail-head{background:var(--black);padding:16px 20px}
.cal-detail-date{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:3px}
.cal-detail-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;
  text-transform:uppercase;letter-spacing:-1px;color:var(--white);line-height:.95}
.cal-detail-body{padding:14px 20px 40px}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 20px;gap:10px}
.empty-icon{font-size:38px;opacity:.3}
.empty-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;
  letter-spacing:1px;text-transform:uppercase;color:var(--gray)}
.empty-desc{font-size:12px;color:var(--gray2);text-align:center;line-height:1.6}

.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--black);border-radius:var(--radius);padding:11px 20px;
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;color:var(--white);z-index:500;
  opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-eyebrow">Performance Tracker</div>
    <div class="header-logo">MY<span>FIT</span></div>
    <div class="header-bg">MF</div>
  </div>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showPage('seances')" id="tab-seances">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="1"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Séances
  </button>
  <button class="tab" onclick="showPage('exercices')" id="tab-exercices">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 5v14M18 5v14M3 8h4M17 8h4M3 16h4M17 16h4"/></svg>
    Exercices
  </button>
  <button class="tab" onclick="showPage('historique')" id="tab-historique">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    Historique
  </button>
  <button class="tab" onclick="showPage('calendrier')" id="tab-calendrier">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="1"/><path d="M16 2v4M8 2v4M3 10h18M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
    Calendrier
  </button>
</div>

<div class="pages">
  <div class="page active" id="page-seances">
    <div class="sec-header">
      <div class="sec-eyebrow">Entraînements</div>
      <div class="sec-title">Mes séances</div>
      <div class="sec-bg">TRAIN</div>
    </div>
    <button class="btn-add" onclick="openModal('modal-seance')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
      Nouvelle séance
    </button>
    <div class="list-wrap" id="seances-list"></div>
  </div>

  <div class="page" id="page-exercices">
    <div class="sec-header">
      <div class="sec-eyebrow">Bibliothèque</div>
      <div class="sec-title">Exercices</div>
      <div class="sec-bg">LIFT</div>
    </div>
    <button class="btn-add" onclick="openModal('modal-exo')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
      Nouvel exercice
    </button>
    <div class="list-wrap" id="exos-list"></div>
  </div>

  <div class="page" id="page-historique">
    <div class="sec-header">
      <div class="sec-eyebrow">Séances passées</div>
      <div class="sec-title">Historique</div>
      <div class="sec-bg">LOG</div>
    </div>
    <div class="list-wrap" id="history-list"></div>
  </div>

  <div class="page" id="page-calendrier">
    <div class="sec-header">
      <div class="sec-eyebrow">Suivi</div>
      <div class="sec-title">Calendrier</div>
      <div class="sec-bg">CAL</div>
    </div>
    <div class="cal-view-switch">
      <button class="cal-view-btn active" id="btn-view-month" onclick="setCalView('month')">Mois</button>
      <button class="cal-view-btn" id="btn-view-week" onclick="setCalView('week')">Semaine</button>
    </div>
    <div class="cal-nav-row">
      <div class="cal-month" id="cal-month-label"></div>
      <div class="cal-nav-btns">
        <button class="cal-nav-btn" onclick="calNav(-1)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button class="cal-nav-btn" onclick="calNav(1)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>
    <div class="cal-legend" id="cal-legend"></div>
    <div id="cal-content"></div>
  </div>
</div>

<!-- MODAL EXO -->
<div class="overlay" id="modal-exo" onclick="closeOnOverlay(event,'modal-exo')">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="exo-modal-title">Nouvel exercice</div>
      <button class="modal-x" onclick="closeModal('modal-exo')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="exo-edit-id">
      <div class="form-group">
        <label class="form-label">Nom</label>
        <input class="form-input" id="exo-name" placeholder="ex: Développé couché" autocomplete="off">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Séries cibles</label>
          <input class="form-input" id="exo-series" type="number" placeholder="3" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">Reps</label>
          <input class="form-input" id="exo-reps" type="number" placeholder="10" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">Repos (s)</label>
          <input class="form-input" id="exo-rest" type="number" placeholder="90" min="0">
        </div>
      </div>
      <button class="btn-full" onclick="saveExercice()">Sauvegarder</button>
      <button class="btn-cancel" onclick="closeModal('modal-exo')">Annuler</button>
    </div>
  </div>
</div>

<!-- MODAL SÉANCE -->
<div class="overlay" id="modal-seance" onclick="closeOnOverlay(event,'modal-seance')">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="seance-modal-title">Nouvelle séance</div>
      <button class="modal-x" onclick="closeModal('modal-seance')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="seance-edit-id">
      <div class="form-group">
        <label class="form-label">Nom</label>
        <input class="form-input" id="seance-name" placeholder="ex: Push Day A" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-input" id="seance-desc" placeholder="ex: Poitrine, épaules, triceps..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Couleur</label>
        <div class="color-picker" id="seance-color-picker"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Exercices</label>
        <div class="exo-selector" id="exo-selector"></div>
      </div>
      <button class="btn-full" onclick="saveSeance()">Sauvegarder</button>
      <button class="btn-cancel" onclick="closeModal('modal-seance')">Annuler</button>
    </div>
  </div>
</div>

<!-- SESSION -->
<div class="session-screen" id="session-screen">
  <div class="session-top">
    <div class="session-name-wrap">
      <div class="session-name" id="session-title-text">Séance</div>
      <div class="session-sub" id="session-subtitle-text">Sélectionne un exercice</div>
    </div>
    <div class="session-top-bg">GO</div>
    <button class="btn-stop" onclick="confirmEndSession()">Stop</button>
  </div>
  <div class="session-body">
    <div id="exo-picker">
      <div class="picker-label">— Choisir un exercice</div>
      <div class="picker-list" id="picker-grid"></div>
    </div>
    <div class="active-exo" id="active-exo-area">
      <div class="exo-topbar">
        <button class="btn-back" onclick="backToPicker()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </button>
        <div class="exo-topbar-info">
          <div class="exo-name-display" id="active-exo-name"></div>
          <div class="exo-meta-display" id="active-exo-meta"></div>
        </div>
      </div>
      <div class="series-progress" id="series-progress"></div>
      <div class="series-area" id="series-cards-area"></div>
      <div class="timer-section" id="timer-area" style="display:none">
        <div class="timer-wrap">
          <div class="timer-eye">— Temps de repos</div>
          <div class="timer-ring">
            <svg class="timer-svg" viewBox="0 0 120 120">
              <circle class="timer-track" cx="60" cy="60" r="54"/>
              <circle class="timer-fill" id="timer-circle-fill" cx="60" cy="60" r="54"/>
            </svg>
            <div class="timer-num" id="timer-display">00</div>
          </div>
          <div class="timer-sub" id="timer-label-text"></div>
          <div class="timer-btns">
            <button class="btn-skip" onclick="skipTimer()">Passer</button>
            <button class="btn-next" onclick="nextSerie()">Série suivante</button>
          </div>
          <div class="timer-bg">REST</div>
        </div>
      </div>
      <div class="validate-area">
        <button class="btn-validate" id="btn-validate-serie" onclick="validateSerie()">Valider la série</button>
        <button class="btn-change" onclick="backToPicker()">← Changer d'exercice</button>
      </div>
    </div>
  </div>
</div>

<!-- END MODAL -->
<div class="end-modal" id="end-modal">
  <div class="end-card">
    <div class="end-top">
      <div class="end-eyebrow">— Séance terminée</div>
      <div class="end-title">Well Done.</div>
      <div class="end-top-bg">GG</div>
    </div>
    <div class="end-stats-row" id="end-stats"></div>
    <div class="end-body">
      <div class="end-desc" id="end-desc"></div>
      <button class="btn-full" onclick="finalizeSession()">Sauvegarder</button>
    </div>
  </div>
</div>

<!-- CAL DETAIL -->
<div class="cal-detail-overlay" id="cal-detail-overlay" onclick="closeOnOverlay(event,'cal-detail-overlay')">
  <div class="cal-detail-sheet">
    <div id="cal-detail-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var COLORS = ['#E8001D','#0A0A0A','#2563EB','#16A34A','#D97706','#7C3AED','#0891B2','#DC2626','#059669','#9333EA'];

var DB = {
  get: function(k) { try { return JSON.parse(localStorage.getItem('mf_' + k)) || []; } catch(e) { return []; } },
  set: function(k, v) { localStorage.setItem('mf_' + k, JSON.stringify(v)); },
  uid: function() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 6); }
};

var exercices = DB.get('exos');
var seances = DB.get('seances');
var historique = DB.get('history');
var currentSession = null;
var timerInterval = null;
var timerStartVal = 0;
var timerCurrent = 0;
var currentExoInSession = null;
var currentSerieIndex = 0;
var calView = 'month';
var calDate = new Date();
var selectedColor = COLORS[0];

function save() { DB.set('exos', exercices); DB.set('seances', seances); DB.set('history', historique); }

function toast(msg, bg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = bg || 'var(--black)';
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function showPage(p) {
  document.querySelectorAll('.page').forEach(function(x) { x.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); });
  document.getElementById('page-' + p).classList.add('active');
  document.getElementById('tab-' + p).classList.add('active');
  if (p === 'seances') renderSeances();
  if (p === 'exercices') renderExercices();
  if (p === 'historique') renderHistorique();
  if (p === 'calendrier') renderCalendar();
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
  if (id === 'modal-seance') { renderExoSelector(); renderColorPicker(); }
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  if (id === 'modal-exo') resetExoForm();
  if (id === 'modal-seance') resetSeanceForm();
}

function closeOnOverlay(e, id) {
  if (e.target.id === id) closeModal(id);
}

// Header date
(function() {
  var d = new Date();
  var h = d.getHours();
  var greet = h < 12 ? 'Good morning' : (h < 18 ? 'Good afternoon' : 'Good evening');
  document.getElementById('headerDate').textContent = greet + ' — ' + d.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
})();

// COLOR PICKER
function renderColorPicker(current) {
  selectedColor = current || COLORS[0];
  var html = '';
  for (var i = 0; i < COLORS.length; i++) {
    var c = COLORS[i];
    html += '<div class="color-dot ' + (c === selectedColor ? 'selected' : '') + '" style="background:' + c + '" onclick="selectColor(\'' + c + '\',this)"></div>';
  }
  document.getElementById('seance-color-picker').innerHTML = html;
}

function selectColor(c, el) {
  selectedColor = c;
  document.querySelectorAll('.color-dot').forEach(function(d) { d.classList.remove('selected'); });
  el.classList.add('selected');
}

// EXERCICES
function resetExoForm() {
  document.getElementById('exo-edit-id').value = '';
  document.getElementById('exo-modal-title').textContent = 'Nouvel exercice';
  ['exo-name','exo-series','exo-reps','exo-rest'].forEach(function(id) { document.getElementById(id).value = ''; });
}

function saveExercice() {
  var name = document.getElementById('exo-name').value.trim();
  if (!name) { toast('Nom requis'); return; }
  var series = parseInt(document.getElementById('exo-series').value) || 3;
  var reps = parseInt(document.getElementById('exo-reps').value) || 10;
  var rest = parseInt(document.getElementById('exo-rest').value) || 90;
  var editId = document.getElementById('exo-edit-id').value;
  if (editId) {
    var i = exercices.findIndex(function(e) { return e.id === editId; });
    if (i > -1) exercices[i] = Object.assign({}, exercices[i], {name:name, series:series, reps:reps, rest:rest});
    toast('Modifié ✓');
  } else {
    exercices.push({id: DB.uid(), name:name, series:series, reps:reps, rest:rest});
    toast('Ajouté ✓', 'var(--red)');
  }
  save(); closeModal('modal-exo'); renderExercices();
}

function editExercice(id) {
  var e = exercices.find(function(x) { return x.id === id; });
  if (!e) return;
  document.getElementById('exo-edit-id').value = e.id;
  document.getElementById('exo-modal-title').textContent = 'Modifier exercice';
  document.getElementById('exo-name').value = e.name;
  document.getElementById('exo-series').value = e.series;
  document.getElementById('exo-reps').value = e.reps;
  document.getElementById('exo-rest').value = e.rest;
  openModal('modal-exo');
}

function deleteExercice(id) {

}

// SÉANCES
function resetSeanceForm() {
  document.getElementById('seance-edit-id').value = '';
  document.getElementById('seance-modal-title').textContent = 'Nouvelle séance';
  document.getElementById('seance-name').value = '';
  document.getElementById('seance-desc').value = '';
  selectedColor = COLORS[0];
}

function renderExoSelector() {
  var sel = document.getElementById('exo-selector');
  var editId = document.getElementById('seance-edit-id').value;
  var selIds = [];
  if (editId) { var s = seances.find(function(x) { return x.id === editId; }); if (s) selIds = s.exerciceIds || []; }

    html += '<div class="exo-check-meta">' + e.series + 'x' + e.reps + '</div>';
    html += '</div>';
  }
  sel.innerHTML = html;
}

function toggleExoSelect(el) { el.classList.toggle('selected'); }

function saveSeance() {
  var name = document.getElementById('seance-name').value.trim();
  if (!name) { toast('Nom requis'); return; }
  var desc = document.getElementById('seance-desc').value.trim();
  var checked = document.querySelectorAll('#exo-selector .exo-check.selected');
  var ids = [];
  var allChecks = document.querySelectorAll('#exo-selector .exo-check');
  for (var i = 0; i < allChecks.length; i++) {
    if (allChecks[i].classList.contains('selected')) {
      ids.push(exercices[i].id);
    }
  }
  if (!ids.length) { toast('Sélectionne un exercice'); return; }
  var editId = document.getElementById('seance-edit-id').value;
  if (editId) {
    var idx = seances.findIndex(function(s) { return s.id === editId; });
    if (idx > -1) seances[idx] = Object.assign({}, seances[idx], {name:name, desc:desc, exerciceIds:ids, color:selectedColor});
    toast('Modifiée ✓');
  } else {
    seances.push({id: DB.uid(), name:name, desc:desc, exerciceIds:ids, color:selectedColor, createdAt: Date.now()});
    toast('Créée ✓', 'var(--red)');
  }
  save(); closeModal('modal-seance'); renderSeances();
}

function editSeance(id) {
  var s = seances.find(function(x) { return x.id === id; });
  if (!s) return;
  document.getElementById('seance-edit-id').value = s.id;
  document.getElementById('seance-modal-title').textContent = 'Modifier séance';
  document.getElementById('seance-name').value = s.name;
  document.getElementById('seance-desc').value = s.desc || '';
  openModal('modal-seance');
  setTimeout(function() { renderColorPicker(s.color || COLORS[0]); }, 50);
}

function deleteSeance(id) {
  seances = seances.filter(function(s) { return s.id !== id; });
  save(); toast('Supprimée'); renderSeances();
}

function renderSeances() {
  var el = document.getElementById('seances-list');
  if (!seances.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Aucune séance</div><div class="empty-desc">Crée ta première séance</div></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < seances.length; i++) {
    var s = seances[i];
    var color = s.color || COLORS[0];

    }

    html += '<div class="card-eyebrow">Séance</div>';
    html += '<div class="card-title">' + s.name + '</div>';
    if (s.desc) html += '<div class="card-desc">' + s.desc + '</div>';
    html += '<div class="card-tags"><span class="tag tag-outline">' + exos.length + ' exercices</span></div>';
    html += '<div class="card-exos">';
    var maxExos = Math.min(exos.length, 4);
    for (var k = 0; k < maxExos; k++) {
      html += '<div class="card-exo-row"><div class="card-exo-dot" style="background:' + color + '"></div><div class="card-exo-name">' + exos[k].name + '</div><div class="card-exo-meta">' + exos[k].series + 'x' + exos[k].reps + '</div></div>';
    }
    if (exos.length > 4) html += '<div style="font-size:11px;color:var(--gray2);padding:4px 0">+' + (exos.length-4) + ' autres</div>';
    html += '</div>';
    html += '<div class="card-actions"><button class="btn-sm btn-red" style="flex:2" onclick="startSession(\'' + s.id + '\')">▶ Démarrer</button><button class="btn-sm btn-outline" onclick="editSeance(\'' + s.id + '\')">✏</button><button class="btn-danger-sm" onclick="deleteSeance(\'' + s.id + '\')">🗑</button></div>';
    html += '</div></div>';

// SESSION
function startSession(seanceId) {
  var s = seances.find(function(x) { return x.id === seanceId; });
  if (!s) return;
  var exos = [];
  for (var i = 0; i < s.exerciceIds.length; i++) {
    var e = exercices.find(function(x) { return x.id === s.exerciceIds[i]; });
    if (e) exos.push(e);
  }
  if (!exos.length) { toast('Aucun exercice valide'); return; }
  currentSession = {seanceId:s.id, seanceName:s.name, seanceColor:s.color||COLORS[0], startTime:Date.now(), exos:exos, log:{}, completedExoIds:[]};
  document.getElementById('session-title-text').textContent = s.name.toUpperCase();
  showPicker();
  document.getElementById('session-screen').classList.add('open');
}

function showPicker() {
  document.getElementById('exo-picker').style.display = 'block';
  document.getElementById('active-exo-area').classList.remove('open');
  document.getElementById('session-subtitle-text').textContent = 'Sélectionne un exercice';
  var color = currentSession.seanceColor;
  var html = '';
  for (var i = 0; i < currentSession.exos.length; i++) {
    var e = currentSession.exos[i];
    var done = currentSession.completedExoIds.indexOf(e.id) > -1;
    html += '<div class="picker-item ' + (done ? 'done' : '') + '" onclick="selectExo(\'' + e.id + '\')">';
    html += '<div class="picker-side" style="background:' + (done ? '#16A34A' : color) + '"></div>';
    html += '<div class="picker-idx">' + (done ? '✓' : String(i+1).padStart(2,'0')) + '</div>';
    html += '<div class="picker-info"><div class="picker-name">' + e.name + '</div><div class="picker-meta">' + e.series + ' séries × ' + e.reps + ' reps · ' + e.rest + 's repos</div></div>';
    html += '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--gray3);flex-shrink:0"><path d="M9 18l6-6-6-6"/></svg></div>';
  }
  html += '<div style="padding:0 0 0"><button class="btn-full" style="border-radius:var(--radius);margin-top:14px;background:var(--black)" onclick="confirmEndSession()">⏹ Terminer la séance</button></div>';
  document.getElementById('picker-grid').innerHTML = html;
}

function selectExo(id) {
  var e = currentSession.exos.find(function(x) { return x.id === id; });
  if (!e) return;
  currentExoInSession = e; currentSerieIndex = 0; stopTimer();
  document.getElementById('active-exo-name').textContent = e.name.toUpperCase();
  document.getElementById('active-exo-meta').textContent = e.series + ' séries × ' + e.reps + ' reps · ' + e.rest + 's repos';
  document.getElementById('timer-area').style.display = 'none';
  document.getElementById('btn-validate-serie').style.display = 'block';
  buildSeriesCards(e);
  document.getElementById('exo-picker').style.display = 'none';
  document.getElementById('active-exo-area').classList.add('open');
  document.getElementById('session-subtitle-text').textContent = e.name.toUpperCase();
}

function buildSeriesCards(e) {
  var existing = currentSession.log[e.id] || [];
  var progHtml = '';
  for (var i = 0; i < e.series; i++) {
    var cls = i < existing.length ? 'done' : (i === 0 ? 'active' : '');
    progHtml += '<div class="prog-seg ' + cls + '" id="pd-' + i + '"></div>';
  }
  document.getElementById('series-progress').innerHTML = progHtml;
  var cardsHtml = '';
  for (var i = 0; i < e.series; i++) {
    var done = i < existing.length;
    var data = existing[i] || {};
    cardsHtml += '<div class="series-card ' + (i===0 ? 'active-series' : '') + '" id="sc-' + i + '">';
    cardsHtml += '<div class="series-card-head"><div class="series-lbl">Série ' + (i+1) + '</div>' + (done ? '<span class="series-done-badge">✓ DONE</span>' : '') + '</div>';
    cardsHtml += '<div class="series-inputs"><div class="input-group"><label>Reps</label><input type="number" id="reps-' + i + '" placeholder="' + e.reps + '" value="' + (done ? data.reps : '') + '" min="0" ' + (done ? 'disabled' : '') + '></div>';
    cardsHtml += '<div class="input-group"><label>Poids kg</label><input type="number" id="poids-' + i + '" placeholder="0" value="' + (done ? data.poids : '') + '" min="0" step="0.5" ' + (done ? 'disabled' : '') + '></div></div>';
    cardsHtml += '</div>';
  }
  document.getElementById('series-cards-area').innerHTML = cardsHtml;
  currentSerieIndex = existing.length < e.series ? existing.length : e.series - 1;
  updateSerieUI();
}

function updateSerieUI() {
  var e = currentExoInSession;
  var existing = currentSession.log[e.id] || [];
  for (var i = 0; i < e.series; i++) {
    var pd = document.getElementById('pd-' + i);
    var sc = document.getElementById('sc-' + i);
    if (i < existing.length) { if(pd) pd.className = 'prog-seg done'; if(sc) sc.classList.remove('active-series'); }
    else if (i === currentSerieIndex) { if(pd) pd.className = 'prog-seg active'; if(sc) sc.classList.add('active-series'); }
    else { if(pd) pd.className = 'prog-seg'; if(sc) sc.classList.remove('active-series'); }
  }
  var allDone = existing.length >= e.series;
  document.getElementById('btn-validate-serie').style.display = allDone ? 'none' : 'block';
  document.getElementById('btn-validate-serie').textContent = currentSerieIndex === e.series-1 ? 'Valider — Dernière série' : 'Valider + Repos';
}

function validateSerie() {
  var e = currentExoInSession;
  var i = currentSerieIndex;
  var reps = document.getElementById('reps-' + i).value || e.reps;
  var poids = document.getElementById('poids-' + i).value || 0;
  if (!currentSession.log[e.id]) currentSession.log[e.id] = [];
  currentSession.log[e.id].push({serie: i+1, reps: parseInt(reps), poids: parseFloat(poids)});
  document.getElementById('reps-' + i).disabled = true;
  document.getElementById('poids-' + i).disabled = true;
  var isLast = currentSerieIndex >= e.series - 1;
  if (isLast) {
    if (currentSession.completedExoIds.indexOf(e.id) === -1) currentSession.completedExoIds.push(e.id);
    document.getElementById('btn-validate-serie').style.display = 'none';
    document.getElementById('timer-area').style.display = 'none';
    toast('Exercice terminé 💪', 'var(--red)');
    setTimeout(function() { backToPicker(); }, 1200);
    return;
  }
  currentSerieIndex++;
  updateSerieUI();
  if (e.rest > 0) {
    document.getElementById('timer-area').style.display = 'block';
    document.getElementById('btn-validate-serie').style.display = 'none';
    startTimer(e.rest);
  }
}

function backToPicker() { stopTimer(); currentExoInSession = null; showPicker(); }

function startTimer(secs) {
  stopTimer();
  timerStartVal = secs; timerCurrent = secs;
  document.getElementById('timer-circle-fill').style.strokeDashoffset = 0;
  updateTimerDisplay();
  timerInterval = setInterval(function() {
    timerCurrent--;
    if (timerCurrent <= 0) {
      timerCurrent = 0; updateTimerDisplay(); stopTimer(); playBeep();
      document.getElementById('timer-circle-fill').style.strokeDashoffset = 339.3;
      document.getElementById('timer-label-text').textContent = "C'est l'heure !";
      document.getElementById('btn-validate-serie').style.display = 'block';
      return;
    }
    updateTimerDisplay();
    document.getElementById('timer-circle-fill').style.strokeDashoffset = 339.3 * (timerStartVal - timerCurrent) / timerStartVal;
  }, 1000);
}

function updateTimerDisplay() {
  var m = Math.floor(timerCurrent/60), s = timerCurrent % 60;
  document.getElementById('timer-display').textContent = timerCurrent >= 60 ? (m + ':' + (s < 10 ? '0'+s : s)) : String(timerCurrent);
  document.getElementById('timer-label-text').textContent = timerStartVal + 's de repos';
}

function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
function skipTimer() { stopTimer(); document.getElementById('timer-area').style.display = 'none'; document.getElementById('btn-validate-serie').style.display = 'block'; updateSerieUI(); }
function nextSerie() { skipTimer(); }

function playBeep() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 200, 400].forEach(function(t) {
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination); o.frequency.value = 880; o.type = 'sine';
      g.gain.setValueAtTime(0, ctx.currentTime+t/1000);
      g.gain.linearRampToValueAtTime(.5, ctx.currentTime+t/1000+.05);
      g.gain.linearRampToValueAtTime(0, ctx.currentTime+t/1000+.35);
      o.start(ctx.currentTime+t/1000); o.stop(ctx.currentTime+t/1000+.4);
    });
  } catch(e) {}
}

function confirmEndSession() {
  stopTimer();
  var exoCount = Object.keys(currentSession.log).length;
  var totalSeries = Object.values(currentSession.log).reduce(function(a,b) { return a+b.length; }, 0);
  var dur = Math.round((Date.now() - currentSession.startTime) / 60000);
  document.getElementById('end-desc').textContent = exoCount + ' exercice(s), ' + totalSeries + ' série(s) réalisée(s).';
  document.getElementById('end-stats').innerHTML =
    '<div class="end-stat"><div class="end-stat-val">' + exoCount + '</div><div class="end-stat-lbl">Exercices</div></div>' +
    '<div class="end-stat"><div class="end-stat-val">' + totalSeries + '</div><div class="end-stat-lbl">Séries</div></div>' +
    '<div class="end-stat"><div class="end-stat-val">' + dur + '</div><div class="end-stat-lbl">Minutes</div></div>';
  document.getElementById('end-modal').classList.add('open');
}

function finalizeSession() {
  if (!currentSession) return;
  var record = {id: DB.uid(), seanceId: currentSession.seanceId, seanceName: currentSession.seanceName,
    seanceColor: currentSession.seanceColor, date: currentSession.startTime,
    duration: Math.round((Date.now() - currentSession.startTime) / 60000),
    log: currentSession.log, exoNames: {}};
  currentSession.exos.forEach(function(e) { record.exoNames[e.id] = e.name; });
  historique.unshift(record);
  save();
  document.getElementById('end-modal').classList.remove('open');
  document.getElementById('session-screen').classList.remove('open');
  currentSession = null;
  toast('Séance sauvegardée !', 'var(--red)');
  showPage('calendrier');
}

function renderHistorique() {
  var el = document.getElementById('history-list');
  if (!historique.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Aucun historique</div><div class="empty-desc">Tes séances apparaîtront ici</div></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < historique.length; i++) {
    var h = historique[i];
    var d = new Date(h.date);
    var dateStr = d.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', year:'numeric'}).toUpperCase();
    var exoCount = Object.keys(h.log).length;

    var color = h.seanceColor || COLORS[0];
    html += '<div class="history-item" onclick="toggleHistDetail(\'' + h.id + '\')">';
    html += '<div class="history-bar" style="background:' + color + '"></div>';
    html += '<div class="history-body"><div class="history-date">' + dateStr + '</div>';
    html += '<div class="history-name">' + h.seanceName + '</div>';
    html += '<div class="history-meta">';
    html += '<div class="hist-chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 5v14M18 5v14M3 8h4M17 8h4M3 16h4M17 16h4"/></svg>' + exoCount + ' exos</div>';
    html += '<div style="margin-left:auto"><button class="btn-danger-sm" style="padding:5px 10px;font-size:11px" onclick="deleteHistory(event,\'' + h.id + '\')">🗑</button></div>';
    html += '</div></div></div>';
    html += '<div class="hist-detail" id="hd-' + h.id + '">';
    var logEntries = Object.entries(h.log);
    for (var j = 0; j < logEntries.length; j++) {
      var exoId = logEntries[j][0], series = logEntries[j][1];
      html += '<div class="hist-exo-block"><div class="hist-exo-name">' + ((h.exoNames && h.exoNames[exoId]) || 'Exercice') + '</div>';
      html += '<div class="hist-series-row">';
      for (var k = 0; k < series.length; k++) {
        html += '<div class="hist-serie-chip">S' + (k+1) + ': <b>' + series[k].reps + 'r</b> × <b>' + series[k].poids + 'kg</b></div>';
      }
      html += '</div></div>';
    }
    html += '</div>';
  }
  el.innerHTML = html;
}

function toggleHistDetail(id) { document.getElementById('hd-' + id).classList.toggle('open'); }

function deleteHistory(e, id) {
  e.stopPropagation();
  historique = historique.filter(function(h) { return h.id !== id; });
  save(); toast('Supprimé'); renderHistorique();
}

// CALENDAR
function setCalView(v) {
  calView = v;
  document.getElementById('btn-view-month').classList.toggle('active', v === 'month');
  document.getElementById('btn-view-week').classList.toggle('active', v === 'week');
  renderCalendar();
}

function calNav(dir) {
  if (calView === 'month') calDate = new Date(calDate.getFullYear(), calDate.getMonth() + dir, 1);
  else calDate = new Date(calDate.getTime() + dir * 7 * 24 * 60 * 60 * 1000);
  renderCalendar();
}

function getHistMap() {
  var map = {};
  for (var i = 0; i < historique.length; i++) {
    var h = historique[i];
    var d = new Date(h.date);
    var key = d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
    if (!map[key]) map[key] = [];
    map[key].push(h);
  }
  return map;
}

function renderCalendar() {
  var usedIds = [];
  historique.forEach(function(h) { if (usedIds.indexOf(h.seanceId) === -1) usedIds.push(h.seanceId); });
  var legendHtml = '';
  for (var i = 0; i < usedIds.length; i++) {
    var h = historique.find(function(x) { return x.seanceId === usedIds[i]; });
    if (h) legendHtml += '<div class="legend-item"><div class="legend-dot" style="background:' + (h.seanceColor||COLORS[0]) + '"></div>' + h.seanceName + '</div>';
  }
  document.getElementById('cal-legend').innerHTML = legendHtml;
  var label = document.getElementById('cal-month-label');
  if (calView === 'month') {
    label.textContent = calDate.toLocaleDateString('fr-FR', {month:'long', year:'numeric'}).toUpperCase();
    renderMonthView();
  } else {
    var mon = getMonday(calDate);
    var sun = new Date(mon.getTime() + 6*24*60*60*1000);
    label.textContent = (mon.getDate() + ' — ' + sun.toLocaleDateString('fr-FR', {day:'numeric', month:'short'})).toUpperCase();
    renderWeekView(mon);
  }
}

function getMonday(d) {
  var day = d.getDay(), diff = d.getDate() - (day === 0 ? 6 : day - 1);
  return new Date(d.getFullYear(), d.getMonth(), diff);
}

function renderMonthView() {
  var histMap = getHistMap();
  var today = new Date();
  var year = calDate.getFullYear(), month = calDate.getMonth();
  var firstDay = new Date(year, month, 1).getDay();
  var offset = firstDay === 0 ? 6 : firstDay - 1;
  var daysInMonth = new Date(year, month+1, 0).getDate();
  var days = ['L','M','M','J','V','S','D'];
  var html = '<div class="cal-grid">';
  for (var d = 0; d < days.length; d++) html += '<div class="cal-day-lbl">' + days[d] + '</div>';
  for (var o = 0; o < offset; o++) html += '<div></div>';
  for (var d = 1; d <= daysInMonth; d++) {
    var key = year + '-' + month + '-' + d;
    var sessions = histMap[key] || [];
    var isToday = today.getDate()===d && today.getMonth()===month && today.getFullYear()===year;
    var hasSess = sessions.length > 0;
    var bg = hasSess ? sessions[0].seanceColor || COLORS[0] : '';
    html += '<div class="cal-cell ' + (isToday?'today':'') + ' ' + (hasSess?'clickable':'') + '"';
    if (hasSess) html += ' style="background:' + bg + ';border-radius:6px"';
    if (hasSess) html += ' onclick="showCalDetail(' + year + ',' + month + ',' + d + ')"';
    html += '><div class="cal-cell-num" style="' + (hasSess?'color:#000;font-weight:800':'') + '">' + d + '</div>';
    if (hasSess && sessions.length > 1) {
      html += '<div class="cal-cell-dots">';
      var maxDots = Math.min(sessions.length, 3);
      for (var s = 0; s < maxDots; s++) html += '<div class="cal-cell-dot" style="background:rgba(255,255,255,.6)"></div>';
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('cal-content').innerHTML = html;
}

function renderWeekView(monday) {
  var histMap = getHistMap();
  var today = new Date();
  var dayNames = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  var html = '<div class="week-wrap">';
  for (var i = 0; i < 7; i++) {
    var d = new Date(monday.getTime() + i * 24*60*60*1000);
    var key = d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
    var sessions = histMap[key] || [];
    var isToday = d.toDateString() === today.toDateString();
    html += '<div class="week-row"><div class="week-label"><div class="week-day">' + dayNames[i] + '</div><div class="week-num' + (isToday?' today':'') + '">' + d.getDate() + '</div></div>';
    html += '<div class="week-sessions">';
    if (sessions.length) {
      for (var s = 0; s < sessions.length; s++) {
        html += '<div class="week-chip" style="background:' + (sessions[s].seanceColor||COLORS[0]) + '" onclick="showCalDetail(' + d.getFullYear() + ',' + d.getMonth() + ',' + d.getDate() + ')">' + sessions[s].seanceName + '</div>';
      }
    } else {
      html += '<div class="week-rest">Repos</div>';
    }
    html += '</div></div>';
  }
  html += '</div>';
  document.getElementById('cal-content').innerHTML = html;
}

function showCalDetail(year, month, day) {
  var histMap = getHistMap();
  var key = year + '-' + month + '-' + day;
  var sessions = histMap[key] || [];
  if (!sessions.length) return;
  var d = new Date(year, month, day);
  var dateStr = d.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', year:'numeric'}).toUpperCase();
  var html = '<div class="cal-detail-head"><div class="cal-detail-date">' + dateStr + '</div>';
  html += '<div class="cal-detail-title">' + sessions.length + ' Séance' + (sessions.length>1?'s':'') + '</div></div>';
  html += '<div class="cal-detail-body">';
  for (var i = 0; i < sessions.length; i++) {
    var h = sessions[i];
    var color = h.seanceColor || COLORS[0];
    var exoCount = Object.keys(h.log).length;
    var totalSeries = Object.values(h.log).reduce(function(a,b) { return a+b.length; }, 0);
    html += '<div style="border-left:4px solid ' + color + ';padding-left:12px;margin-bottom:16px">';
    html += '<div style="font-family:Barlow Condensed,sans-serif;font-size:18px;font-weight:800;text-transform:uppercase;margin-bottom:6px">' + h.seanceName + '</div>';
    html += '<div style="display:flex;gap:6px;margin-bottom:10px"><span class="tag tag-outline">' + exoCount + ' exos</span><span class="tag tag-gray">' + totalSeries + ' séries</span></div>';
    var logEntries = Object.entries(h.log);
    for (var j = 0; j < logEntries.length; j++) {
      var exoId = logEntries[j][0], series = logEntries[j][1];
      html += '<div class="hist-exo-block"><div class="hist-exo-name">' + ((h.exoNames&&h.exoNames[exoId])||'Exercice') + '</div>';
      html += '<div class="hist-series-row">';
      for (var k = 0; k < series.length; k++) {
        html += '<div class="hist-serie-chip">S' + (k+1) + ': <b>' + series[k].reps + 'r</b> × <b>' + series[k].poids + 'kg</b></div>';
      }
      html += '</div></div>';
    }
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('cal-detail-content').innerHTML = html;
  document.getElementById('cal-detail-overlay').classList.add('open');
}

renderSeances();
